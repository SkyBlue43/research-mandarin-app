name: Frontend Workflow

on:
  push:
    paths:
      - "src/**"
  pull_request:
    paths:
      - "src/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # or "latest"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Run Jest tests
      #   run: pnpm run test

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # or "latest"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Run ESLint
      #   run: pnpm run lint
